# OKH-Manifest – Open Know-How Standard, Version 2.4
# Spezifikation: https://github.com/iop-alliance/OpenKnowHow
# Schema:        https://w3id.org/oseg/schema/okh.schema.json
#
# Dieses Manifest beschreibt das Möbel als Open-Source-Hardware-Werk.
# Verkaufsdaten (Preise, Lieferbedingungen, Bestände) gehören NICHT hier rein
# - sie werden separat im Shop-Backend (Medusa) verwaltet.
#
# Pflichtfelder: okhv, name, repo, license, licensor, function
#
# ----------------------------------------------------------------------------
# WICHTIG zur TOML-Reihenfolge:
# Alle Top-Level-Felder (skalare Werte und einfache Arrays) MÜSSEN vor dem
# ersten Section-Header ([...] oder [[...]]) stehen.
# ----------------------------------------------------------------------------

# ============================================================================
# TOP-LEVEL-FELDER
# ============================================================================

"$schema" = "https://w3id.org/oseg/schema/okh.schema.json"

okhv = "2.4"

# --- Identität ---
name = "FIXME Möbelname"
repo = "https://github.com/heimeliq/FIXME-heimeliq-<reihe>-<waldname>"

# --- Lizenz ---
license = "CERN-OHL-S-2.0"
licensor = "FIXME Vorname Nachname (FIXME-nickname) <FIXME@heimeliq.de>"

# --- Beschreibung ---
function = """
FIXME: Was tut dieses Möbel? Wofür ist es gemacht?
Wer profitiert davon, welches Problem löst es?
Mehrere Sätze sind erlaubt und erwünscht – dieses Feld wird in OSH-Suchen
als Hauptbeschreibung verwendet.
"""

# --- Dokumentations-Sprache(n) ---
documentation-language = "de"

# --- Reifegrad der Dokumentation ---
documentation-readiness-level = "ODRL-2"

# --- Technologie-spezifische Dokumentationskriterien ---
tsdc = ["MEC", "ASM"]

# --- Masse des Möbels (in Gramm) ---
mass = 0     # FIXME

# --- Pfade zu Dokumentations-Dateien ---
manufacturing-instructions = "docs/de/build-guide.md"
bom = "docs/de/bom.md"
readme = "README.md"

# ============================================================================
# SECTIONS
# ============================================================================

# --- Äußere Abmessungen des Möbels (in mm) ---
[outer-dimensions]
width = 0    # FIXME
depth = 0    # FIXME
height = 0   # FIXME

# --- Organisation ---
[[organization]]
name = "heimeliq"
url = "https://heimeliq.de"

# --- Hauptbilder (für Außenwirkung) ---
[[image]]
location = "media/hero.jpg"
slots = ["photo-thing-main", "model-main"]
tags = ["photo"]
depicts = "FIXME: kurze Beschreibung des Hauptbildes"

# ============================================================================
# EIGENE BAUTEILE (open-source, in OKH-`part`-Array)
# ============================================================================
# Jedes Bauteil bekommt eine möbel-lokale, voll-qualifizierte ID:
#   A001.S001, A001.S002, ...  (Bauteile der Hauptbaugruppe)
#   A002.S001, A002.S002, ...  (Bauteile einer Sub-Baugruppe)
#
# `source` zeigt auf die FreeCAD-Datei der zugehörigen Baugruppe,
# in der das Bauteil definiert ist.
#
# Externe Drittteile (Schrauben, Beschläge) stehen NICHT hier, sondern in
# heimeliq.toml unter [[external_parts]].

[[part]]
name = "FIXME Bauteilname (z. B. Korpus-Seitenwand links)"
source = "cad/source/A001-FIXME-name.FCStd"
export = ["cad/exports/A001/FIXME-bauteil-01.step", "cad/exports/A001/FIXME-bauteil-01.stl"]
mass = 0
heimeliq-part-id = "A001.S001"
heimeliq-assembly = "A001"
tsdc = ["MEC"]
outer-dimensions = { width = 0, depth = 0, height = 0 }

# Beispiel für ein Bauteil in einer Sub-Baugruppe (z. B. Schublade).
# Bei Bedarf entfernen.
[[part]]
name = "FIXME Bauteilname in Sub-Baugruppe (z. B. Schubladen-Boden)"
source = "cad/source/A002-FIXME-name.FCStd"
export = ["cad/exports/A002/FIXME-bauteil-01.step"]
mass = 0
heimeliq-part-id = "A002.S001"
heimeliq-assembly = "A002"
tsdc = ["MEC"]
outer-dimensions = { width = 0, depth = 0, height = 0 }
